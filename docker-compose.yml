services:
  postgres:
    image: postgres:16-alpine
    container_name: rg-academy-db
    restart: always
    environment:
      POSTGRES_USER: rg_admin
      POSTGRES_PASSWORD: rg_password_2026
      POSTGRES_DB: rg_academy
    ports:
      - "5439:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:

